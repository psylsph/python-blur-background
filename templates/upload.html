<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Processor</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 flex flex-col items-center justify-center min-h-screen">
    <h1 class="text-3xl font-bold mb-6 text-blue-700">Image Processor</h1>
    <form method="post" enctype="multipart/form-data" class="bg-white p-8 rounded shadow-md w-full max-w-md">
        <input type="file" name="image" accept="image/*" required class="mb-4 p-2 border rounded w-full">

        <div class="mb-4 flex items-center">
            <label for="blur" class="mr-2 text-gray-700">Blur Amount:</label>
            <input type="range" name="blur" id="blur" min="0" max="30" step="1" value="{{ blur  }}" class="flex-1" oninput="updatePreview(true)">
        </div>
        <button type="submit" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline">Process Image</button>
    </form>
    <div id="preview-container" class="mt-8 hidden">
        <h2 class="text-xl font-semibold mb-4 text-blue-700">Image Preview</h2>
         <div id="loading-message" class="hidden">Processing...</div>
        <img id="preview-image" src="" alt="Blurred Image Preview" class="max-w-full rounded border border-gray-300">
    </div>
    <script>
        let currentFile = null;
        const fileInput = document.querySelector('input[type="file"]');
        fileInput.addEventListener('change', (event) => {
            currentFile = event.target.files[0];
            updatePreview(false);
        });

        function updatePreview(liveUpdate) {
            const previewContainer = document.getElementById('preview-container');
            const previewImage = document.getElementById('preview-image');
            const blurAmount = document.getElementById('blur').value;
            const loadingMessage = document.getElementById('loading-message');
            
            loadingMessage.classList.remove('hidden');
            previewImage.classList.add('hidden');
            previewContainer.classList.remove('hidden');

            const formData = new FormData();
            formData.append('image', currentFile);
            formData.append('blur', blurAmount);

            fetch('/preview', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                 if (data.error) {
                    console.error('Error:', data.error);
                     loadingMessage.classList.add('hidden');
                } else {
                    previewImage.src = 'data:image/png;base64,' + data.image;
                    previewImage.classList.remove('hidden');
                    loadingMessage.classList.add('hidden');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                 loadingMessage.classList.add('hidden');
            });
        }
    </script>
</body>
</html>
