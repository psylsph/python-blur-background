<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Processed Image</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8fafc;
        }
        .bg-blue-gradient {
            background: linear-gradient(135deg, #60a5fa 0%, #b2ebf2 100%);
        }
        .btn-primary {
            background-color: #60a5fa;
            border-color: #60a5fa;
            color: white;
            font-weight: bold;
            padding: 1rem 2rem;
            border-radius: 0.375rem;
            transition: background-color 0.3s, border-color 0.3s;
        }
        .btn-primary:hover {
            background-color: #4299e1;
            border-color: #4299e1;
        }
    </style>
</head>
<body class="bg-blue-gradient flex flex-col items-center justify-center min-h-screen p-8">
	<div class="container mx-auto max-w-3xl px-6 py-8 bg-white rounded-lg shadow-md border border-gray-200 space-y-4">
		<h1 class="text-6xl font-bold mb-8 text-blue-700 text-center">Processed Image</h1>
        <img src="/view/{{ output_file }}" alt="Combined Image" class="max-w-full mb-4 rounded border border-gray-300">
        <br>
        <a href="/output/{{ output_file }}" download="processed_image.png" class="btn-primary text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline">Download Image</a>
	</div>
</body>
</html>
