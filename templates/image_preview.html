<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Processed Image</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 flex flex-col items-center justify-center min-h-screen p-4">
	<div class="container mx-auto max-w-3xl px-4 py-6 bg-white rounded-lg shadow-md border border-gray-200">
		<h1 class="text-3xl font-bold mb-6 text-blue-700 text-center">Processed Image</h1>
        <img src="/view/{{ output_file }}" alt="Combined Image" class="max-w-full mb-4 rounded border border-gray-300">
        <br>
        <a href="/output/{{ output_file }}" download="processed_image.png" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline">Download Image</a>
	</div>
</body>
</html>
