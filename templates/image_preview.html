<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Processed Image</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8fafc;
        }
        .bg-blue-gradient {
            background: linear-gradient(135deg, #60a5fa 0%, #b2ebf2 100%);
        }
        .btn-primary {
            background-color: #60a5fa;
            border-color: #60a5fa;
            color: white;
            font-weight: bold;
            padding: 1rem 2rem;
            border-radius: 0.375rem;
            transition: background-color 0.3s, border-color 0.3s;
        }
        .btn-primary:hover {
            background-color: #4299e1;
            border-color: #4299e1;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 2rem;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="bg-blue-gradient flex items-center justify-center min-h-screen font-sans">
    <div class="container">
		<h1 class="text-4xl font-bold mb-8 text-blue-700 text-center">Processed Image</h1>
        <img src="/view/{{ output_file }}" alt="Combined Image" class="max-w-full rounded border border-gray-300">
        <br>
        <a href="/output/{{ output_file }}" download="processed_image.png" class="btn-primary w-full text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline">Download Image</a>
	</div>
</body>
</html>
